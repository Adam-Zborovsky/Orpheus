# Local Ollama LLM server for Orpheus cleanup.
#
# Models + blobs live on E:\A_I (host)  ->  /root/.ollama (container).
# The port is published on loopback only so the host-side Orpheus app can reach
# http://localhost:11434 — it is NOT exposed on the LAN.
#
# GPU note: on Windows Docker Desktop the AMD RX 6800 XT cannot be passed
# through, so this container runs CPU-only. To use the GPU for the LLM, run
# Ollama natively on Windows instead (it bundles ROCm and supports gfx1030).
# The commented rocm block below is for a future Linux host.

services:
  ollama:
    image: ollama/ollama:0.6.8   # pin; bump to current — see README.md
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - "E:/A_I:/root/.ollama"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434   # bind inside the container; loopback-mapped outside
      - OLLAMA_KEEP_ALIVE=30m       # keep the model warm between dictations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    # --- AMD GPU on a LINUX host only (does not work on Windows Docker Desktop):
    # image: ollama/ollama:0.6.8-rocm
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

  # Pulls the cleanup model once Ollama is healthy, then exits. Edit the model
  # name to match Orpheus Settings > Ollama model.
  model-loader:
    image: curlimages/curl:8.11.1
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -sf -X POST http://ollama:11434/api/pull
      -d '{\"model\": \"llama3.1:8b\"}'"
    restart: "no"
